<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>國際輪盤 | 進化版 | 彩色籌碼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0a1a, #02010a);
            min-height: 100vh;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                                linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            max-width: 390px;
            width: 100%;
            margin: 0 auto;
            background: transparent;
            min-height: 844px;
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
            z-index: 2;
            padding-bottom: 0;
            border-radius: 32px;
            overflow: hidden;
        }

        .top-nav {
            background: linear-gradient(145deg, #1e243b, #0b0f1a);
            border-radius: 28px 28px 0 0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-bottom: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
            gap: 10px;
            flex-wrap: wrap;
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-icon {
            background: linear-gradient(145deg, #ffdd55, #e6a800);
            width: 34px; height: 34px; border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px; color: #1a1f2f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
        }
        .logo-text { font-weight: bold; font-size: 16px; color: #ffcc00; text-shadow: 0 2px 3px rgba(0,0,0,0.5); }
        .player-info-compact {
            display: flex; align-items: center; gap: 12px;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(8px);
            padding: 5px 16px 5px 10px; border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .compact-avatar {
            width: 38px; height: 38px;
            background: linear-gradient(145deg, #ffcc44, #ff9933);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #1a1f2f; box-shadow: 0 0 8px #ffcc44;
        }
        .compact-name { font-size: 12px; font-weight: 800; color: #fff0cc; }
        .compact-detail { display: flex; gap: 12px; font-size: 9px; font-weight: bold; color: #bbddff; }
        .player-points { color: #ffdd88; font-weight: bold; }

        /* 視訊區 */
        .video-section {
            position: relative;
            background: linear-gradient(145deg, #0a1215, #050a0c);
            border-left: 1px solid rgba(0, 255, 255, 0.35);
            border-right: 1px solid rgba(0, 255, 255, 0.35);
            border-bottom: 1px solid rgba(0, 255, 255, 0.35);
            overflow: visible;
            display: flex;
            justify-content: center;
            padding: 16px 0;
            z-index: 5;
        }
        .roulette-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .roulette-wrapper {
            position: relative;
            width: min(300px, 78vw);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.5));
        }
        .dealer-status {
            position: absolute;
            bottom: -28px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
        }
        .dealer-status span {
            display: inline-block;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 9px;
            color: #ffdd99;
            border: 1px solid rgba(255,215,0,0.5);
            letter-spacing: 1px;
        }
        .video-countdown {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #ffcc44;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
        }
        .video-countdown .countdown-number { font-size: 18px; font-weight: 800; color: #ffdd99; }
        .video-countdown.urgent .countdown-number { color: #ff6666; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .tab-container {
            background: rgba(6, 10, 20, 0.88);
            backdrop-filter: blur(16px);
            border-left: 1px solid rgba(0, 255, 255, 0.6);
            border-right: 1px solid rgba(0, 255, 255, 0.6);
            padding: 8px 10px 0;
            margin-top: 8px;
            position: relative;
            z-index: 6;
        }
        .swipe-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            cursor: grab;
            scrollbar-width: none;
            user-select: none;
        }
        .swipe-container:active { cursor: grabbing; }
        .swipe-container::-webkit-scrollbar { display: none; }
        .tab-page {
            flex: 0 0 100%;
            min-width: 100%;
            scroll-snap-align: start;
            padding: 0 4px;
        }
        .page-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .page-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .page-dot.active { background: #ffcc88; width: 20px; border-radius: 4px; }

        /* 三欄布局 */
        .three-column-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 5px;
            min-height: 320px;
        }
        .history-panel {
            width: 48px;
            flex-shrink: 0;
            background: rgba(6, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 5px 3px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .history-title {
            font-size: 7px;
            color: #bbddff;
            font-weight: bold;
            text-align: center;
            padding-bottom: 3px;
            border-bottom: 1px solid rgba(255,204,0,0.3);
            margin-bottom: 4px;
            width: 100%;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 100%;
            align-items: center;
            max-height: 260px;
            overflow-y: auto;
        }
        /* ========== 開牌紀錄滾動條 - 更細更美觀 ========== */
        .history-list::-webkit-scrollbar {
            width: 3px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #0a1a1a;
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #ffcc88;
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb:hover {
            background: #ffaa44;
        }
        /* Firefox 滾動條 */
        .history-list {
            scrollbar-width: thin;
            scrollbar-color: #ffcc88 #0a1a1a;
        }

        .history-item {
            width: 36px;
            height: 30px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 13px;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,0,0.4);
        }
        .history-item.red-bg { background: #c62828; }
        .history-item.black-bg { background: #1a1a1a; border-color: #5a4a2e; }
        .history-item.green-bg { background: #0f7a43; border-color: #e6bc7e; }

        .middle-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 0;
            transform: translateY(-6px);
        }
        .roulette-bet-panel {
            width: auto;
            background: #070b12;
            border-radius: 16px;
            padding: 8px 5px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center top;
        }
        .middle-area.expanded .roulette-bet-panel {
            transform: scale(1.08) translateY(-16px);
            z-index: 20;
            position: relative;
        }
        .track-wrapper {
            display: flex;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform-origin: center top;
            transform: translateY(-6px);
        }
        .middle-area.expanded .track-wrapper {
            transform: scale(1.08) translateY(-16px);
            z-index: 20;
            position: relative;
        }

        .right-integrated-panel {
            width: 52px;
            flex-shrink: 0;
            background: rgba(6, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 4px 2px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .right-chips-title {
            text-align: center;
            font-size: 6px;
            color: #bbddff;
            font-weight: bold;
            padding-bottom: 2px;
            border-bottom: 1px solid rgba(255,204,0,0.3);
        }
        .right-chips-grid {
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: center;
        }

        /* ========== 彩色籌碼樣式 ========== */
        .chip-small {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
            border: 1.5px solid #ffcc44;
            transition: 0.05s linear;
        }
        .chip-small[data-value="1"] {
            background: radial-gradient(circle at 35% 35%, #ffffff, #e0e0e0, #b0b0b0);
            color: #333;
            border-color: #c0c0c0;
        }
        .chip-small[data-value="5"] {
            background: radial-gradient(circle at 35% 35%, #ff9999, #cc3333, #991111);
            color: white;
            border-color: #ffcc00;
        }
        .chip-small[data-value="10"] {
            background: radial-gradient(circle at 35% 35%, #99ccff, #3366cc, #113399);
            color: white;
            border-color: #ffcc00;
        }
        .chip-small[data-value="50"] {
            background: radial-gradient(circle at 35% 35%, #99ff99, #33aa33, #116611);
            color: white;
            border-color: #ffcc00;
        }
        .chip-small[data-value="100"] {
            background: radial-gradient(circle at 35% 35%, #ffcc99, #dd8822, #aa5511);
            color: white;
            border-color: #ffcc00;
        }
        .chip-small[data-value="500"] {
            background: radial-gradient(circle at 35% 35%, #cc99ff, #8844cc, #552299);
            color: white;
            border-color: #ffcc00;
        }
        .chip-small[data-value="1000"] {
            background: radial-gradient(circle at 35% 35%, #ffdd88, #dd9922, #aa6611);
            color: #333;
            border-color: #ffcc44;
        }
        .chip-small[data-value="5000"] {
            background: radial-gradient(circle at 35% 35%, #cc8866, #aa4422, #772200);
            color: white;
            border-color: #ffcc44;
        }
        .chip-small:active { transform: scale(0.94); }
        .chip-small.active-chip {
            box-shadow: 0 0 0 2px cyan, 0 0 0 3px rgba(0,255,255,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
            transform: scale(1.02);
            border-color: white;
        }

        .action-buttons-vertical {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            margin-top: 2px;
            padding-top: 3px;
            border-top: 1px solid rgba(255,204,0,0.3);
        }
        .action-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.05s linear;
        }
        .action-circle:active { transform: scale(0.94); }
        .action-circle.confirm { color: #ff4444; border-color: #ff4444; }
        .action-circle.cancel { color: #ffaa44; border-color: #ffaa44; }

        /* 綠色底版 grid */
        .roulette-grid {
            display: grid;
            grid-template-columns: minmax(28px, 32px) minmax(24px, 28px) repeat(3, minmax(28px, 34px));
            grid-auto-rows: minmax(26px, 30px);
            background: #070b12;
            border: none;
            width: 100%;
            margin: 0 auto;
        }
        .cell {
            background: rgba(12, 18, 28, 0.8);
            backdrop-filter: blur(2px);
            border: 0.5px solid rgba(201, 162, 61, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.55rem;
            color: #fef3da;
            text-shadow: 0 1px 0 rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            padding: 0;
            line-height: 1;
        }
        .cell:hover {
            background: rgba(70, 84, 110, 0.95);
            border-color: #f3cd81;
            transform: scale(1.01);
            z-index: 2;
        }
        .number-cell { font-size: 0.65rem; font-weight: 800; }
        .cell-zero {
            background: radial-gradient(circle at 30% 35%, #0f7a43, #0a5331);
            border-color: #e6bc7e;
            font-size: 0.8rem;
            font-weight: 900;
        }
        .red-number { background: #c62828; color: #fff9e8; }
        .black-number { background: #1a1a1a; color: #ece5ce; }
        .outside-bet {
            background: radial-gradient(circle at 30% 35%, #188754, #0a5331);
            font-size: 0.55rem;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }
        .outside-red { color: #ff5555; }
        .outside-black { color: #ffffff; text-shadow: none; font-weight: 900; }
        .outside-normal { color: #f5e6b8; }
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 0.5rem;
            font-weight: 800;
            background: radial-gradient(circle at 30% 35%, #188754, #0a5331);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .column-bet {
            background: radial-gradient(circle at 30% 35%, #188754, #0a5331);
            font-size: 0.55rem;
            font-weight: 800;
        }
        .chip-animation {
            animation: chipPopSmall 0.13s cubic-bezier(0.2, 1.1, 0.8, 1) forwards;
        }
        @keyframes chipPopSmall {
            0% { transform: scale(1); background: rgba(255, 210, 70, 0.3); }
            50% { transform: scale(1.04); background: rgba(255, 200, 80, 0.5); }
            100% { transform: scale(1); background: inherit; }
        }
        .chips-stack-area {
            position: absolute;
            bottom: 1px;
            right: 2px;
            display: flex;
            flex-wrap: wrap-reverse;
            gap: 1px;
            pointer-events: none;
            z-index: 5;
        }
        .mini-chip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffdd99, #e6a44c);
            font-size: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .selected-highlight { background: rgba(0, 229, 255, 0.3) !important; border-color: #0ff !important; }

        .total-bet-info {
            display: flex;
            justify-content: space-between;
            background: rgba(6, 10, 20, 0.88);
            border-radius: 30px;
            padding: 6px 10px;
            font-size: 9px;
            color: #88ddff;
            border: 0.5px solid cyan;
            margin-top: 8px;
        }

        /* 第二頁：直立式輪盤賽道 */
        .race-track-container {
            position: relative;
            width: 100%;
            max-width: 230px;
            height: auto;
            aspect-ratio: 450 / 860;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            transform: scale(0.92);
        }
        .race-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 30px;
        }
        .grid-cell {
            stroke: #e6c96e;
            stroke-width: 1.2px;
            cursor: pointer;
            transition: all 0.2s ease;
            stroke-linejoin: round;
        }
        .grid-cell:hover {
            stroke: #fff4cf;
            stroke-width: 2px;
            filter: url(#lux-glow);
            opacity: 0.98;
        }
        .french-zone {
            stroke: #dbb55e;
            stroke-width: 1.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .french-zone:hover {
            filter: url(#lux-glow);
            fill-opacity: 0.55 !important;
            stroke: #ffe5a3;
            stroke-width: 2px;
        }
        .cell-text {
            font-weight: 900;
            font-size: 10px;
            dominant-baseline: central;
            text-anchor: middle;
            fill: #fff8e7;
            text-shadow: 0 1px 2px #000000dd;
            pointer-events: none;
            font-family: "Montserrat", "Arial Black", "Microsoft JhengHei", sans-serif;
        }
        .zone-label {
            font-weight: 900;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: central;
            fill: #ffefb9;
            text-shadow: 0 1px 3px #000000aa;
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            font-size: 9px;
        }
        .bet-toast {
            position: fixed;
            bottom: 7%;
            left: 50%;
            transform: translateX(-50%);
            background: #071f12e6;
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffefc0;
            border: 1.5px solid #f3cd81;
            font-size: 0.85rem;
            font-weight: bold;
            z-index: 2000;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: toastGlide 1.3s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
        }
        @keyframes toastGlide {
            0% { opacity: 0; transform: translateX(-50%) translateY(28px); }
            18% { opacity: 1; transform: translateX(-50%) translateY(-2px); }
            25% { transform: translateX(-50%) translateY(1px); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-22px); visibility: hidden; }
        }

        /* 聊天室 */
        .chat-room {
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 28px 28px 0 0;
            border-top: 1px solid rgba(0, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            max-height: 70%;
            min-height: 54px;
            transition: all 0.3s ease;
        }
        .chat-room.expanded {
            bottom: 0;
            max-height: 70%;
            right: 50px;
            left: 0;
            border-radius: 28px 0 0 0;
        }
        .chat-room.collapsed {
            bottom: -20px;
            min-height: 54px;
            max-height: 54px;
            background: rgba(0, 0, 0, 0.5);
            right: 0;
        }
        .chat-room.collapsed .chat-messages,
        .chat-room.collapsed .chat-input-area {
            display: none;
        }
        .chat-header {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }
        .chat-header .gift-icon { font-size: 16px; color: #ffaa88; cursor: pointer; }
        .chat-header span { flex: 1; font-size: 12px; font-weight: bold; color: #ffffff; text-shadow: 0 0 3px rgba(0,0,0,0.5); letter-spacing: 1px; }
        .collapse-icon { transition: transform 0.2s; font-size: 13px; color: #ffcc88; cursor: pointer; }
        .chat-room.collapsed .collapse-icon { transform: rotate(180deg); }
        .chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            max-height: 180px;
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #1e2a3a; border-radius: 8px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #0ff; border-radius: 8px; }
        .chat-msg {
            font-size: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 18px;
            border-left: 4px solid #0ff;
            color: #ffffff;
            margin-bottom: 6px;
            word-break: break-word;

<script>
(function(){
    // ==================== 共用變數 ====================
    const ROULETTE_NUMBERS = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
    const RED_SET = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
    
    let curChip = 100, curChip2 = 100;
    let totalBetMap = new Map(), pendingMap = new Map();
    let totalBetMap2 = new Map(), pendingMap2 = new Map();
    let isLocked = false, balance = 888000, totalCumulativeBet = 0, totalCumulativeBet2 = 0;
    let countdown = 35, countdownTimer = null;
    let historyRecords = [];
    const MAX_HISTORY = 20;
    const allBets = [...Array(37).keys()].map(i=>i.toString());
    ['1-12','13-24','25-36','even','odd','red','black','1-18','19-36','special1','special2','special3','special4'].forEach(t=>allBets.push(t));
    allBets.forEach(t=>{ totalBetMap.set(t,0); pendingMap.set(t,0); totalBetMap2.set(t,0); pendingMap2.set(t,0); });
    
    let currentPage = 0;
    const page1MiddleArea = document.getElementById('page1MiddleArea');
    const page2MiddleArea = document.getElementById('page2MiddleArea');
    
    function expandCurrentPage() {
        if (currentPage === 0 && page1MiddleArea) {
            page1MiddleArea.classList.add('expanded');
        } else if (currentPage === 1 && page2MiddleArea) {
            page2MiddleArea.classList.add('expanded');
        }
    }
    
    function shrinkCurrentPage() {
        if (page1MiddleArea) page1MiddleArea.classList.remove('expanded');
        if (page2MiddleArea) page2MiddleArea.classList.remove('expanded');
    }
    
    function onCountdownStart() { expandCurrentPage(); }
    function onCountdownEnd() { shrinkCurrentPage(); }
    
    function initPageSwipeListener() {
        const wrap = document.getElementById('tabSwipe');
        if (!wrap) return;
        const checkPage = () => {
            const scrollLeft = wrap.scrollLeft;
            const pageWidth = wrap.clientWidth;
            const newPage = Math.round(scrollLeft / pageWidth);
            if (newPage !== currentPage) {
                shrinkCurrentPage();
                currentPage = newPage;
                if (!isLocked) expandCurrentPage();
            }
        };
        wrap.addEventListener('scroll', checkPage);
        setTimeout(checkPage, 100);
    }
    
    function updateHistoryUI(containerId, records) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < records.length; i++) {
            const record = records[i];
            const colorClass = record.num === 0 ? 'green-bg' : (RED_SET.has(record.num) ? 'red-bg' : 'black-bg');
            const div = document.createElement('div');
            div.className = `history-item ${colorClass}`;
            div.innerText = record.num;
            container.appendChild(div);
        }
        if (records.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.style.fontSize = '9px';
            emptyDiv.style.color = '#888';
            emptyDiv.style.textAlign = 'center';
            emptyDiv.style.padding = '8px 0';
            emptyDiv.innerText = '暫無';
            container.appendChild(emptyDiv);
        }
    }
    
    function addHistoryRecord(num) {
        historyRecords.unshift({ num: num });
        if (historyRecords.length > MAX_HISTORY) historyRecords.pop();
        updateHistoryUI('historyList', historyRecords);
        updateHistoryUI('historyList2', historyRecords);
    }
    
    function getNumberColorClass(num){ return RED_SET.has(num) ? 'red-number' : 'black-number'; }
    
    function buildGrid(){
        const container = document.getElementById('rouletteGrid');
        if(!container) return;
        container.innerHTML = '';
        function addCell(rS,rE,cS,cE,cls,html,betKey){
            const cell = document.createElement('div');
            cell.style.gridRow = `${rS}/${rE}`; cell.style.gridColumn = `${cS}/${cE}`;
            cell.className = `cell ${cls}`; cell.innerHTML = html;
            if(betKey) cell.setAttribute('data-bet', betKey);
            cell.addEventListener('click',(e)=>{ e.stopPropagation(); cell.classList.add('chip-animation'); setTimeout(()=>cell.classList.remove('chip-animation'),130); addPending(betKey); });
            const stack = document.createElement('div'); stack.className = 'chips-stack-area'; stack.id = `chipsArea-${betKey}`; cell.appendChild(stack);
            container.appendChild(cell);
        }
        function addOutsideBet(rS,rE,cS,cE,label,betKey,type){
            const cell=document.createElement('div');
            cell.style.gridRow=`${rS}/${rE}`; cell.style.gridColumn=`${cS}/${cE}`;
            cell.className='cell outside-bet';
            if(type==='red'){ cell.classList.add('outside-red'); cell.innerHTML=`<span>紅</span><span class="diamond">♦︎</span>`; }
            else if(type==='black'){ cell.classList.add('outside-black'); cell.innerHTML=`<span class="diamond">♦︎</span><span style="color:#fff;">黑</span>`; }
            else { cell.classList.add('outside-normal'); cell.innerHTML=label; }
            cell.setAttribute('data-bet',betKey);
            cell.addEventListener('click',(e)=>{ e.stopPropagation(); cell.classList.add('chip-animation'); setTimeout(()=>cell.classList.remove('chip-animation'),130); addPending(betKey); });
            const stack=document.createElement('div'); stack.className='chips-stack-area'; stack.id=`chipsArea-${betKey}`; cell.appendChild(stack);
            container.appendChild(cell);
        }
        addCell(1,2,3,6,'cell-zero','0','0');
        let num=1;
        for(let row=2; row<=13; row++) for(let col=3; col<=5; col++){ if(num>36) break; addCell(row,row+1,col,col+1,`number-cell ${getNumberColorClass(num)}`,num.toString(),num.toString()); num++; }
        const dozens=[{label:'12',rows:[2,6],bet:'1-12'},{label:'12',rows:[6,10],bet:'13-24'},{label:'12',rows:[10,14],bet:'25-36'}];
        dozens.forEach(dz=>{ addCell(dz.rows[0],dz.rows[1],2,3,'vertical-text',dz.label,dz.bet); });
        addOutsideBet(2,4,1,2,'1~18','1-18','normal');
        addOutsideBet(4,6,1,2,'雙','even','normal');
        addOutsideBet(6,8,1,2,'紅','red','red');
        addOutsideBet(8,10,1,2,'黑','black','black');
        addOutsideBet(10,12,1,2,'單','odd','normal');
        addOutsideBet(12,14,1,2,'19~36','19-36','normal');
        for(let i=0;i<3;i++){ addCell(14,15,3+i,4+i,'column-bet','2:1',`Column ${i+1} 2:1`); }
    }
    
    function addPending(betKey){ if(isLocked){ showToast('⏳ 開牌中，請等待下局'); return; } pendingMap.set(betKey, (pendingMap.get(betKey)||0)+curChip); showToast(`📌 ${betKey} +${curChip}`); }
    function addPending2(betKey){ if(isLocked){ showToast('⏳ 開牌中，請等待下局'); return; } pendingMap2.set(betKey, (pendingMap2.get(betKey)||0)+curChip2); showToast(`📌 ${betKey} +${curChip2}`); }
    
    function confirmBets(){ if(isLocked){ showToast('🔒 開牌中，無法下注'); return; } let added=0; for(let [k,v] of pendingMap.entries()) if(v>0){ totalBetMap.set(k,(totalBetMap.get(k)||0)+v); added+=v; pendingMap.set(k,0); } if(added){ totalCumulativeBet+=added; updateChatPermission(); updateTotalUI(); showToast(`✅ 確認下注 ${added} 點`,'win'); addChatMessage("✅ 系統", `確認下注，總金額 ${added} 點`, "#88ffaa"); } else showToast('⚠️ 沒有暫存下注'); }
    function confirmBets2(){ if(isLocked){ showToast('🔒 開牌中，無法下注'); return; } let added=0; for(let [k,v] of pendingMap2.entries()) if(v>0){ totalBetMap2.set(k,(totalBetMap2.get(k)||0)+v); added+=v; pendingMap2.set(k,0); } if(added){ totalCumulativeBet2+=added; updateTotalUI2(); showToast(`✅ 確認下注 ${added} 點`,'win'); addChatMessage("✅ 系統", `第二頁確認下注，總金額 ${added} 點`, "#88ffaa"); } else showToast('⚠️ 沒有暫存下注'); }
    function clearPending(){ for(let k of pendingMap.keys()) pendingMap.set(k,0); showToast('❌ 暫存已清除'); addChatMessage("❌ 系統", "已清空暫存", "#ffaa66"); }
    function clearPending2(){ for(let k of pendingMap2.keys()) pendingMap2.set(k,0); showToast('❌ 暫存已清除'); addChatMessage("❌ 系統", "第二頁暫存已清空", "#ffaa66"); }
    
    function updateTotalUI(){ let sum=0; for(let v of totalBetMap.values()) sum+=v; document.getElementById('totalBetAmount').innerText=sum; }
    function updateTotalUI2(){ let sum=0; for(let v of totalBetMap2.values()) sum+=v; document.getElementById('totalBetAmount2').innerText=sum; }
    
    function addChatMessage(name, msg, color="#ffcc66"){ let c=document.getElementById('chatMessages'); let t=new Date().toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'}); let d=document.createElement('div'); d.className='chat-msg'; d.innerHTML=`<span class="msg-name" style="color:${color};">${name}</span><span class="msg-time">${t}</span><span> : ${msg}</span>`; c.appendChild(d); c.scrollTop=c.scrollHeight; if(c.children.length>50) c.removeChild(c.children[0]); }
    function updateChatPermission(){ let can=totalCumulativeBet>=200; document.getElementById('chatInput').disabled=!can; document.getElementById('sendChatBtn').disabled=!can; if(can) document.getElementById('chatInput').placeholder="輸入訊息..."; else document.getElementById('chatInput').placeholder=`需累積下注 ${200-totalCumulativeBet} 點解鎖聊天`; }
    function showToast(msg,type='normal'){ let existing=document.querySelector('.result-toast'); if(existing) existing.remove(); let toast=document.createElement('div'); toast.className='result-toast'; if(type==='win')toast.classList.add('win'); toast.innerHTML=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2000); }
    
    function triggerToast(message) {
        const existingToast = document.querySelector(".bet-toast");
        if (existingToast) existingToast.remove();
        const toastDiv = document.createElement("div");
        toastDiv.className = "bet-toast";
        toastDiv.innerText = message;
        document.body.appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 1300);
    }
    
    // 輪盤動畫
    const wheelGroup = document.getElementById('wheelGroup');
    const svgNS = "http://www.w3.org/2000/svg";
    const centerX = 250, centerY = 250, radius = 205;
    const angleStep = (Math.PI * 2) / ROULETTE_NUMBERS.length;
    ROULETTE_NUMBERS.forEach((num, idx) => {
        const startAngle = -Math.PI/2 + idx * angleStep;
        const endAngle = startAngle + angleStep;
        const startX = centerX + radius * Math.cos(startAngle);
        const startY = centerY + radius * Math.sin(startAngle);
        const endX = centerX + radius * Math.cos(endAngle);
        const endY = centerY + radius * Math.sin(endAngle);
        const path = document.createElementNS(svgNS, "path");
        path.setAttribute("d", `M ${centerX} ${centerY} L ${startX} ${startY} A ${radius} ${radius} 0 0 1 ${endX} ${endY} Z`);
        path.setAttribute("fill", num === 0 ? '#0f7a43' : (RED_SET.has(num) ? '#c62828' : '#1a1a1a'));
        path.setAttribute("stroke", "#d4af37");
        path.setAttribute("stroke-width", "1");
        wheelGroup.appendChild(path);
        const midAngle = startAngle + angleStep/2;
        const textRadius = radius - 22;
        const textX = centerX + textRadius * Math.cos(midAngle);
        const textY = centerY + textRadius * Math.sin(midAngle);
        const text = document.createElementNS(svgNS, "text");
        text.setAttribute("x", textX);
        text.setAttribute("y", textY);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle");
        text.setAttribute("fill", "white");
        text.setAttribute("font-size", "13");
        text.setAttribute("font-weight", "bold");
        text.textContent = num;
        wheelGroup.appendChild(text);
    });
    
    let currentRotation = 0, isSpinning = false;
    function rotateWheel(deg) { wheelGroup.setAttribute("transform", `rotate(${deg}, 250, 250)`); currentRotation = deg % 360; }
    function startSpin(targetNumber, duration = 1800, callback) {
        if (isSpinning) return;
        const targetIdx = ROULETTE_NUMBERS.indexOf(targetNumber);
        if (targetIdx === -1) return;
        const targetSectorAngle = (targetIdx * (360 / ROULETTE_NUMBERS.length) - 90 + 360) % 360;
        let currentAngle = currentRotation % 360;
        let delta = targetSectorAngle - currentAngle;
        if (delta <= 0) delta += 360;
        const finalDelta = delta + 5 * 360;
        const startRot = currentRotation;
        const startTime = performance.now();
        isSpinning = true;
        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            rotateWheel(startRot + finalDelta * easeOut);
            if (t < 1) requestAnimationFrame(animate);
            else { rotateWheel(targetSectorAngle); isSpinning = false; if (callback) callback(); }
        }
        requestAnimationFrame(animate);
    }
    
    let ballAngle = 0, ballAnimId = null;
    const ball = document.getElementById("ball");
    function updateBallPosition(angleDeg) { const rad = (angleDeg - 90) * Math.PI / 180; ball.setAttribute("cx", 250 + 215 * Math.cos(rad)); ball.setAttribute("cy", 250 + 215 * Math.sin(rad)); }
    function startBallSpin(duration = 1800) {
        if (ballAnimId) cancelAnimationFrame(ballAnimId);
        const startAngle = ballAngle, startTime = performance.now();
        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            ballAngle = (startAngle - 3 * 360 * ease + 360) % 360;
            updateBallPosition(ballAngle);
            if (t < 1) ballAnimId = requestAnimationFrame(animate);
            else ballAnimId = null;
        }
        ballAnimId = requestAnimationFrame(animate);
    }
    function stopBallSpin() { if (ballAnimId) { cancelAnimationFrame(ballAnimId); ballAnimId = null; } }
    
    function startCountdown() {
        if (countdownTimer) clearInterval(countdownTimer);
        countdown = 35;
        const countdownEl = document.getElementById('countdownNum');
        const ringEl = document.getElementById('countdownRing');
        onCountdownStart();
        countdownTimer = setInterval(() => {
            if (countdown <= 1) {
                clearInterval(countdownTimer);
                countdownTimer = null;
                if (countdownEl) countdownEl.innerText = "0";
                if (ringEl) ringEl.classList.remove('urgent');
                onCountdownEnd();
                isLocked = true;
                const randomNum = Math.floor(Math.random() * 37);
                startBallSpin(1800);
                startSpin(randomNum, 1800, () => {
                    stopBallSpin();
                    addHistoryRecord(randomNum);
                    showToast(`🎲 開出 ${randomNum} 🎲`, 'win');
                    addChatMessage("🎲 荷官", `開出 ${randomNum}，結算中...`, "#0ff");
                    totalBetMap.clear(); allBets.forEach(t => totalBetMap.set(t, 0)); updateTotalUI();
                    totalBetMap2.clear(); allBets.forEach(t => totalBetMap2.set(t, 0)); updateTotalUI2();
                    isLocked = false;
                });
                setTimeout(() => { startCountdown(); }, 3500);
            } else {
                countdown--;
                if (countdownEl) countdownEl.innerText = countdown;
                if (countdown <= 5) ringEl.classList.add('urgent');
                else ringEl.classList.remove('urgent');
            }
        }, 1000);
    }
    
    function initRightChips(containerId, selectedSpanId, onChipChange){
        const chips=[1,5,10,50,100,500,1000,5000];
        const container=document.getElementById(containerId);
        container.innerHTML='';
        chips.forEach(v=>{
            let chip=document.createElement('div');
            chip.className='chip-small';
            chip.setAttribute('data-value',v);
            chip.innerText=v>=1000?(v/1000)+'K':v;
            chip.addEventListener('click',()=>{
                document.querySelectorAll(`#${containerId} .chip-small`).forEach(c=>c.classList.remove('active-chip'));
                chip.classList.add('active-chip');
                onChipChange(v);
                document.getElementById(selectedSpanId).innerText=v>=1000?(v/1000)+'K':v;
            });
            container.appendChild(chip);
        });
        document.querySelector(`#${containerId} .chip-small`).classList.add('active-chip');
    }

    function initGiftBox(){ const giftBtn=document.getElementById('giftIconBtn'); const giftModal=document.getElementById('giftModal'); giftBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(totalCumulativeBet<200){ addChatMessage("🔒 系統",`下注滿200點才能贈送禮物 (目前${totalCumulativeBet}點)`,"#ff8888"); return; } giftModal.classList.toggle('hide'); }); document.querySelectorAll('.gift-option').forEach(opt=>{ opt.addEventListener('click',()=>{ let price=parseInt(opt.getAttribute('data-price')); let name=opt.getAttribute('data-gift'); let emoji=opt.querySelector('.gift-emoji').innerText; if(balance>=price){ balance-=price; document.getElementById('balanceDisplay').innerText=balance.toLocaleString(); addChatMessage("🎁 炫風俠客",`贈送 ${emoji} ${name} (價值 ${price.toLocaleString()} 點)`,"#ff88aa"); let anim=document.createElement('div'); anim.className='gift-animation'; anim.innerHTML=`🎁 ${name} +${price}`; document.body.appendChild(anim); setTimeout(()=>anim.remove(),1500); const statusSpan=document.querySelector('.dealer-status span'); if(statusSpan) statusSpan.innerHTML=`❤️ 收到 ${emoji} ${name}！ 謝謝 ❤️`; setTimeout(()=>{ if(!isLocked && statusSpan) statusSpan.innerHTML="🎡 LIVE | Evolution 風格 | 彩色籌碼"; },2500); } else addChatMessage("⚠️ 系統",`點數不足，贈送 ${name} 需要 ${price.toLocaleString()} 點`,"#ff8888"); giftModal.classList.add('hide'); }); }); document.addEventListener('click',(e)=>{ if(!giftBtn.contains(e.target) && !giftModal.contains(e.target)) giftModal.classList.add('hide'); }); }
    function initCarousel(){ const wrap=document.getElementById('tabSwipe'); const dots=document.querySelectorAll('.page-dot'); function update(){ if(!wrap) return; let idx=Math.round(wrap.scrollLeft/wrap.clientWidth); dots.forEach((dot,i)=>{ if(i===idx) dot.classList.add('active'); else dot.classList.remove('active'); }); } wrap.addEventListener('scroll',update); dots.forEach((dot,i)=>{ dot.addEventListener('click',()=>{ wrap.scrollTo({left:i*wrap.clientWidth,behavior:'smooth'}); }); }); setTimeout(update,100); }
    
    // 直立式輪盤賽道建構
    function buildTrackGrid() {
        const trackWheelOrder = [
            { num: 24, color: "#c0392b" }, { num: 16, color: "#1c2833" }, { num: 33, color: "#c0392b" }, { num: 1, color: "#1c2833" },
            { num: 20, color: "#1c2833" }, { num: 14, color: "#c0392b" }, { num: 31, color: "#1c2833" }, { num: 9, color: "#c0392b" },
            { num: 22, color: "#1c2833" }, { num: 18, color: "#c0392b" }, { num: 29, color: "#1c2833" }, { num: 7, color: "#c0392b" },
            { num: 28, color: "#1c2833" }, { num: 12, color: "#c0392b" }, { num: 35, color: "#1c2833" }, { num: 3, color: "#c0392b" },
            { num: 26, color: "#1c2833" }, { num: 0, color: "#27ae60" }, { num: 32, color: "#c0392b" }, { num: 15, color: "#1c2833" },
            { num: 19, color: "#1c2833" }, { num: 4, color: "#1c2833" }, { num: 21, color: "#c0392b" }, { num: 2, color: "#1c2833" },
            { num: 25, color: "#c0392b" }, { num: 17, color: "#1c2833" }, { num: 34, color: "#c0392b" }, { num: 6, color: "#1c2833" },
            { num: 27, color: "#c0392b" }, { num: 13, color: "#1c2833" }, { num: 36, color: "#c0392b" }, { num: 11, color: "#1c2833" },
            { num: 30, color: "#c0392b" }, { num: 8, color: "#1c2833" }, { num: 23, color: "#c0392b" }, { num: 10, color: "#1c2833" }, { num: 5, color: "#c0392b" }
        ];
        const cX = 225, straightLen = 360, rOuter = 172, rInner = 112, topArcY = 230, botArcY = 590;
        const totalCells = trackWheelOrder.length;
        function getTrackCoordinate(index, radius) {
            const step = index / totalCells;
            let x, y;
            if (step < 0.25) { const t = step / 0.25; x = cX + radius; y = topArcY + t * straightLen; }
            else if (step < 0.5) { const t = (step - 0.25) / 0.25; const rad = t * Math.PI; x = cX + radius * Math.cos(rad); y = botArcY + radius * Math.sin(rad); }
            else if (step < 0.75) { const t = (step - 0.5) / 0.25; x = cX - radius; y = botArcY - t * straightLen; }
            else { const t = (step - 0.75) / 0.25; const rad = Math.PI + t * Math.PI; x = cX + radius * Math.cos(rad); y = topArcY + radius * Math.sin(rad); }
            return { x, y };
        }
        const layer = document.getElementById("trackGridCellsLayer");
        if (!layer) return;
        for (let i = 0; i < totalCells; i++) {
            const cellData = trackWheelOrder[i];
            const pOuter1 = getTrackCoordinate(i, rOuter);
            const pOuter2 = getTrackCoordinate(i + 1, rOuter);
            const pInner2 = getTrackCoordinate(i + 1, rInner);
            const pInner1 = getTrackCoordinate(i, rInner);
            const path = document.createElementNS(svgNS, "path");
            const d = `M ${pOuter1.x} ${pOuter1.y} L ${pOuter2.x} ${pOuter2.y} L ${pInner2.x} ${pInner2.y} L ${pInner1.x} ${pInner1.y} Z`;
            path.setAttribute("d", d);
            path.setAttribute("class", "grid-cell");
            path.setAttribute("fill", cellData.color);
            path.addEventListener("click", () => { addPending2(cellData.num.toString()); });
            layer.appendChild(path);
            const midRadius = (rOuter + rInner) / 2;
            const textPos = getTrackCoordinate(i + 0.5, midRadius);
            const textElem = document.createElementNS(svgNS, "text");
            textElem.setAttribute("x", textPos.x);
            textElem.setAttribute("y", textPos.y);
            textElem.setAttribute("class", "cell-text");
            let rotation = 0;
            const stepRatio = (i + 0.5) / totalCells;
            if (stepRatio < 0.25) rotation = 0;
            else if (stepRatio < 0.5) { let rad = ((stepRatio - 0.25) / 0.25) * Math.PI; rotation = (rad * 180) / Math.PI - 90; }
            else if (stepRatio < 0.75) rotation = 0;
            else { let rad = Math.PI + ((stepRatio - 0.75) / 0.25) * Math.PI; rotation = (rad * 180) / Math.PI + 90; }
            textElem.setAttribute("transform", `rotate(${rotation}, ${textPos.x}, ${textPos.y})`);
            textElem.textContent = cellData.num;
            layer.appendChild(textElem);
        }
    }
    
    function buildFrenchZones() {
        const cX = 225, topArcY = 230, straightLen = 360;
        const layer = document.getElementById("trackFrenchZonesLayer");
        if (!layer) return;
        const centerAnchor = { x: cX, y: topArcY + straightLen / 2 };
        const zones = [
            { name: "零點鄰注", fromIdx: 0, toIdx: 9, fill: "rgba(46, 134, 101, 0.35)", textX: 225, textY: 268, fontSize: 13 },
            { name: "孤注", subName: "(上區)", fromIdx: 9, toIdx: 17, fill: "rgba(52, 152, 219, 0.35)", textX: 182, textY: 412, isMulti: true, upperOffset: true },
            { name: "輪上第三區", fromIdx: 17, toIdx: 28, fill: "rgba(192, 57, 43, 0.35)", textX: 225, textY: 558, fontSize: 13 },
            { name: "孤注", subName: "(下區)", fromIdx: 28, toIdx: 37, fill: "rgba(52, 152, 219, 0.35)", textX: 268, textY: 466, isMulti: true, upperOffset: false }
        ];
        const rInner = 112;
        function getTrackCoordinate(idx, radius) {
            const totalCells = 37;
            const step = idx / totalCells;
            let x, y;
            if (step < 0.25) { const t = step / 0.25; x = cX + radius; y = topArcY + t * straightLen; }
            else if (step < 0.5) { const t = (step - 0.25) / 0.25; const rad = t * Math.PI; x = cX + radius * Math.cos(rad); y = (topArcY + straightLen) + radius * Math.sin(rad); }
            else if (step < 0.75) { const t = (step - 0.5) / 0.25; x = cX - radius; y = (topArcY + straightLen) - t * straightLen; }
            else { const t = (step - 0.75) / 0.25; const rad = Math.PI + t * Math.PI; x = cX + radius * Math.cos(rad); y = topArcY + radius * Math.sin(rad); }
            return { x, y };
        }
        zones.forEach((zone) => {
            let pathPoints = [];
            for (let idx = zone.fromIdx; idx <= zone.toIdx; idx++) {
                const pt = getTrackCoordinate(idx, rInner);
                pathPoints.push(`${pt.x} ${pt.y}`);
            }
            if (pathPoints.length > 0) {
                const dPath = `M ${pathPoints[0]} L ${pathPoints.slice(1).join(" L ")} L ${centerAnchor.x} ${centerAnchor.y} Z`;
                const regionPath = document.createElementNS(svgNS, "path");
                regionPath.setAttribute("d", dPath);
                regionPath.setAttribute("class", "french-zone");
                regionPath.setAttribute("fill", zone.fill);
                regionPath.setAttribute("stroke", "#efcd7b");
                regionPath.setAttribute("stroke-width", "1.5");
                regionPath.addEventListener("click", () => {
                    let displayName = zone.name;
                    if (zone.subName) displayName = zone.name + zone.subName;
                    triggerToast(`🏆 法式下注 · ${displayName} 區域 ➕ 涵蓋多個號碼`);
                });
                layer.appendChild(regionPath);
            }
            if (zone.isMulti) {
                const finalX = zone.upperOffset ? 182 : 268;
                const finalY = 412;
                const groupText = document.createElementNS(svgNS, "text");
                groupText.setAttribute("x", finalX);
                groupText.setAttribute("y", finalY);
                groupText.setAttribute("class", "zone-label");
                groupText.setAttribute("text-anchor", "middle");
                groupText.setAttribute("dominant-baseline", "central");
                const tspan1 = document.createElementNS(svgNS, "tspan");
                tspan1.setAttribute("x", finalX);
                tspan1.setAttribute("dy", "-0.7em");
                tspan1.setAttribute("font-size", "14px");
                tspan1.setAttribute("font-weight", "900");
                tspan1.textContent = "孤注";
                groupText.appendChild(tspan1);
                const tspan2 = document.createElementNS(svgNS, "tspan");
                tspan2.setAttribute("x", finalX);
                tspan2.setAttribute("dy", "1.2em");
                tspan2.setAttribute("font-size", "10px");
                tspan2.setAttribute("font-weight", "800");
                tspan2.setAttribute("fill", "#ffe6a3");
                tspan2.textContent = zone.subName;
                groupText.appendChild(tspan2);
                layer.appendChild(groupText);
            } else {
                const singleText = document.createElementNS(svgNS, "text");
                singleText.setAttribute("x", zone.textX);
                singleText.setAttribute("y", zone.textY);
                singleText.setAttribute("class", "zone-label");
                singleText.setAttribute("font-size", `${zone.fontSize}px`);
                singleText.setAttribute("font-weight", "900");
                singleText.textContent = zone.name;
                layer.appendChild(singleText);
            }
        });
    }
    
    buildGrid();
    buildTrackGrid();
    buildFrenchZones();
    initRightChips('rightChipsGrid', 'selectedChipVal', (v) => curChip = v);
    initRightChips('rightChipsGrid2', 'selectedChipVal2', (v) => curChip2 = v);

    document.getElementById('cancelBtn').addEventListener('click', clearPending);

    document.getElementById('cancelBtn2').addEventListener('click', clearPending2);

    initPageSwipeListener();

    startCountdown();

})();
